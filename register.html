<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Nexus Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .auth-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--accent-pink); /* Розовая рамка для реги */
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.15);
            text-align: center;
        }

        .auth-panel h2 {
            color: var(--text-main);
            margin-bottom: 25px;
            font-size: 28px;
            text-transform: uppercase;
        }

        .auth-panel label {
            display: block;
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-lime);
            text-decoration: none;
            font-weight: 600;
            transition: text-shadow 0.3s;
        }

        .auth-links a:hover {
            text-shadow: 0 0 8px var(--accent-lime);
        }
    </style>
</head>
<body>

    <div class="auth-panel">
        <h2>Регистрация</h2>
        
        <form id="registerForm">
            <div style="margin-bottom: 15px;">
                <label for="regUsername">Имя пользователя (Никнейм)</label>
                <input type="text" id="regUsername" placeholder="CyberNinja" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="regPassword">Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль" required minlength="6">
            </div>

            <div style="margin-bottom: 25px;">
                <label for="regConfirmPassword">Повторите пароль</label>
                <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="btn-primary" style="background-color: var(--accent-pink); color: #fff;">Создать аккаунт</button>
        </form>

        <div class="auth-links">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
