<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nexus Store | Кибер-Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">NEXUS STORE</div>
        <div class="header-center">
            <nav class="categories">
                <a href="#">Игры</a>
                <a href="#">Софт</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn-primary" onclick="window.location.href='login.html'">Войти</button>
        </div>
    </header>

    <main class="main-content">
        <h2 class="section-title">Каталог товаров</h2>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image">IMG</div>
                <div class="product-title">Ключ Windows 11 Pro</div>
                <div class="card-bottom">
                    <div class="product-price">399 ₽</div>
                    <button class="buy-btn" onclick="addToCart('win11', 'Ключ Windows 11 Pro', 399)">В корзину</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image">IMG</div>
                <div class="product-title">Случайный Steam Ключ</div>
                <div class="card-bottom">
                    <div class="product-price">49 ₽</div>
                    <button class="buy-btn" onclick="addToCart('steam_rnd', 'Случайный Steam Ключ', 49)">В корзину</button>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-cart" id="cartBtn">
        <div class="cart-badge" id="cartCount" style="display:none;">0</div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20a1 1 0 100 2 1 1 0 000-2zM20 20a1 1 0 100 2 1 1 0 000-2zM1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    </div>

    <script src="cart.js"></script>
</body>
</html>
