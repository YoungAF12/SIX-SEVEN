<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цифровой Маркетплейс</title>
<style>
    :root {
        --bg-color: #121212; /* Глубокий черный */
        --panel-bg: #1e1e1e;
        --primary-color: #ff9800; /* Мягко-оранжевый */
        --primary-hover: #e68a00;
        --text-main: #ffffff;
        --text-muted: #aaaaaa;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
    }

    .container { max-width: 800px; margin: 0 auto; }

    .card {
        background-color: var(--panel-bg);
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        border: 1px solid #333;
    }

    h2 { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: var(--text-muted); }
    
    input[type="text"], input[type="number"], select, textarea {
        width: 100%;
        padding: 10px;
        background-color: var(--bg-color);
        border: 1px solid #444;
        color: var(--text-main);
        border-radius: 6px;
        box-sizing: border-box;
    }

    input:focus, textarea:focus { outline: none; border-color: var(--primary-color); }

    button {
        background-color: var(--primary-color);
        color: #000;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
    }

    button:hover { background-color: var(--primary-hover); }

    .qr-mockup {
        text-align: center;
        margin-top: 20px;
        padding: 20px;
        border: 2px dashed var(--primary-color);
        border-radius: 12px;
        display: none; /* Скрыто до нажатия кнопки */
    }
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Панель продавца: Добавление товара</h2>
        <div class="form-group">
            <label>Название (например: Ключ Windows 11 или Аккаунт Steam)</label>
            <input type="text" placeholder="Введите название товара">
        </div>
        <div class="form-group">
            <label>Тип товара</label>
            <select>
                <option>Ключ активации</option>
                <option>Программа / Софт</option>
                <option>Игровой аккаунт</option>
            </select>
        </div>
        <div class="form-group">
            <label>Скрытое содержимое (выдается после оплаты)</label>
            <textarea rows="4" placeholder="XXXX-XXXX-XXXX-XXXX или ссылка на скачивание"></textarea>
        </div>
        <div class="form-group">
            <label>Цена (₽)</label>
            <input type="number" placeholder="999">
        </div>
        <button onclick="document.getElementById('qr-section').style.display='block'">Сохранить и выставить на продажу</button>
    </div>

    <div class="card qr-mockup" id="qr-section" style="margin-top: 20px;">
        <h2>Оплата по СБП</h2>
        <p style="color: var(--text-muted);">Отсканируйте QR-код в приложении вашего банка</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Mockup" alt="QR СБП">
        <p>Сумма к оплате: <strong>999 ₽</strong></p>
        <button style="background-color: #28a745; color: white;">Эмулировать успешную оплату</button>
    </div>
</div>

</body>
</html>
