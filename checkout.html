<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; padding-top: 50px;">
        <div class="panel">
            <h2>Данные доставки</h2>
            <input type="email" id="buyerEmail" placeholder="Ваш Email">
            <button class="btn-primary" id="generateQrBtn">Оплатить СБП</button>
            
            <div id="qrSection" style="display:none; text-align:center;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAYMENT_SB_NEXUS" alt="QR">
                <p>Ожидание оплаты...</p>
            </div>
        </div>

        <div class="panel">
            <h2>Ваш заказ</h2>
            <div id="orderItemsContainer"></div>
            <div class="total-price">
                <span>Итого:</span>
                <span id="finalPrice">0 ₽</span>
            </div>
        </div>
    </div>

    <script src="cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedCart = JSON.parse(localStorage.getItem('nexus_cart')) || [];
            const container = document.getElementById('orderItemsContainer');
            const priceEl = document.getElementById('finalPrice');
            
            let total = 0;
            savedCart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="order-item">${item.title} — ${item.price} ₽</div>`;
            });
            priceEl.textContent = total + ' ₽';

            document.getElementById('generateQrBtn').onclick = () => {
                document.getElementById('qrSection').style.display = 'block';
                setTimeout(() => {
                    alert('Оплата прошла! Товар отправлен на email.');
                    localStorage.removeItem('nexus_cart');
                    window.location.href = 'index.html';
                }, 3000);
            };
        });
    </script>
</body>
</html>
